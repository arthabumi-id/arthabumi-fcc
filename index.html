function renderTxn(filtered) {
  // Urut: TANGGAL desc, lalu CREATED_AT desc (input terakhir di paling atas utk tanggal sama).
  const data = (filtered || [...state.txns]).sort((a,b) => String(b.TANGGAL).localeCompare(String(a.TANGGAL)) || String(b.CREATED_AT||'').localeCompare(String(a.CREATED_AT||'')));
  // Saldo berjalan per rekening bank: anchor ke saldo terkini (akurat dari server), lalu mundur dari txn terbaru.
  const runBal = {};
  state.banks.forEach(b => {
    const list = state.txns.filter(t => t.REKENING === b.NAMA)
      .sort((x,y)=> String(y.TANGGAL).localeCompare(String(x.TANGGAL)) || String(y.CREATED_AT||'').localeCompare(String(x.CREATED_AT||'')));
    let bal = getSaldo(b.NAMA).saldo;
    list.forEach(t => { runBal[t.ID] = bal; const nom = Number(t.NOMINAL)||0; bal -= (t.JENIS==='Pemasukan' ? nom : -nom); });
  });
  document.getElementById('txnList').innerHTML = data.length ? data.map(t => {
    const isTr = t.TIPE_LOG === 'Transfer', isRes = t.TIPE_LOG === 'Reserve';
    return `<div class="card" style="padding:13px 14px;margin-bottom:9px">
      <div style="display:flex;align-items:center;gap:11px">
        <div style="width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:${t.JENIS==='Pemasukan'?'var(--ic-green)':isTr?'var(--ic-blue)':isRes?'var(--ic-purple)':'var(--ic-red)'};flex-shrink:0">
          <i class="ti ti-${t.JENIS==='Pemasukan'?'arrow-down-left':isTr?'arrows-exchange':isRes?'shield-check':'arrow-up-right'}" style="font-size:17px;color:${t.JENIS==='Pemasukan'?'var(--green)':isTr?'var(--blue)':isRes?'var(--purple)':'var(--red)'}"></i>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.PROJECT||t.KATEGORI||'—')}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">${esc(t.REKENING)}${t.PROJECT&&t.KATEGORI?(' · '+esc(t.KATEGORI)):''} · ${shortDate(t.TANGGAL)}</div>
          ${t.NOTES ? `<div style="font-size:12px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.NOTES)}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:16px;font-weight:700;color:${t.JENIS==='Pemasukan'?'var(--green)':'var(--red)'}">${t.JENIS==='Pemasukan'?'+':'-'}${fmt(Number(t.NOMINAL))}</div>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:4px">
            ${runBal[t.ID]!==undefined ? `<span style="font-size:12px;color:var(--text3);white-space:nowrap">saldo ${fmt(runBal[t.ID])}</span>` : ''}
            ${(!isTr&&!isRes) ? `<button aria-label="Edit transaksi" style="font-size:17px;line-height:1;background:transparent;border:none;color:var(--text3);cursor:pointer;padding:0" onclick="editTxn('${t.ID}')"><i class="ti ti-pencil"></i></button>` : '<span style="font-size:11px;color:var(--text3)">auto</span>'}
          </div>
        </div>
      </div>
    </div>`;
  }).join('') : '<div class="empty">Tidak ada transaksi</div>';

  // Tombol muat data lebih lama (hanya di tampilan default & saat online)
  if (!filtered && API_URL) {
    document.getElementById('txnList').innerHTML +=
      `<button class="btn-primary" style="width:100%;margin-top:10px;opacity:.85" onclick="loadMoreTxns(this)"><i class="ti ti-history"></i> Muat transaksi lebih lama</button>
       <div style="text-align:center;font-size:10px;color:var(--text3);margin-top:6px">Menampilkan sejak ${state.txnsSince || '—'}</div>`;
  }
}

async function loadMoreTxns(btn) {
  if (!API_URL) return;
  if (btn) btn.innerHTML = '<div class="spin" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></div> memuat...';
  const cur = state.txnsSince || daysAgoISO(120);
  const d = new Date(cur); d.setMonth(d.getMonth() - 12); // mundur 12 bulan
  const newSince = d.toISOString().slice(0, 10);
  const older = await apiGet({ action: 'getTxns', since: newSince, until: cur });
  if (Array.isArray(older)) {
    const ids = new Set(state.txns.map(t => t.ID));
    let added = 0;
    older.forEach(t => { if (!ids.has(t.ID)) { state.txns.push(t); added++; } });
    state.txnsSince = newSince;
    saveLocal();
    renderTxnMonthTabs();
    filterTxn();
    showToast(added ? ('+' + added + ' transaksi lama dimuat') : 'Tidak ada transaksi lebih lama', 'success');
  } else {
    filterTxn();
    showToast('Gagal memuat transaksi lama', 'error');
  }
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
// Tanggal ringkas "29 Jun" dari ISO yyyy-mm-dd (fallback ke string asli bila format aneh).
function shortDate(iso){ const p=String(iso||'').slice(0,10).split('-'); if(p.length<3||!p[2]) return String(iso||''); return (+p[2])+' '+(MONTH_NAMES[(+p[1])-1]||p[1]); }
function monthLabel(ym){ const p = ym.split('-'); return MONTH_NAMES[(+p[1])-1] + " '" + p[0].slice(2); }
function renderTxnMonthTabs(){
  fillRekFilter();
  const el = document.getElementById('txnMonthTabs'); if(!el) return;
  const months = [...new Set(state.txns.map(t => String(t.TANGGAL).slice(0,7)).filter(Boolean))].sort().reverse();
  if (state.txnMonth === null) state.txnMonth = months[0] || ''; // default: bulan terbaru
  const pill = (val,label) => `<button onclick="setTxnMonth('${val}')" style="flex:none;padding:6px 13px;border-radius:16px;border:1px solid var(--border2);font-size:12px;cursor:pointer;white-space:nowrap;background:${state.txnMonth===val?'var(--green)':'transparent'};color:${state.txnMonth===val?'#06140d':'var(--text2)'};font-weight:${state.txnMonth===val?'700':'400'}">${label}</button>`;
  let html = pill('','Semua') + months.map(m => pill(m, monthLabel(m))).join('');
  if (API_URL) html += `<button onclick="loadMoreTxns(this)" style="flex:none;padding:6px 13px;border-radius:16px;border:1px dashed var(--border2);font-size:12px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--text3)"><i class="ti ti-history"></i> lebih lama</button>`;
  el.innerHTML = html;
}
function setTxnMonth(m){ const f=document.getElementById('txnFrom'),t=document.getElementById('txnTo'); if(f)f.value=''; if(t)t.value=''; state.txnMonth = m; renderTxnMonthTabs(); filterTxn(); }
// Isi opsi dropdown filter rekening (bank + CC), pertahankan pilihan saat ini.
function fillRekFilter(){
  const sel = document.getElementById('txnRekFilter'); if(!sel) return;
  const cur = sel.value;
  const names = [...state.banks.map(b=>b.NAMA), ...state.ccs.map(c=>c.NAMA)];
  sel.innerHTML = '<option value="">Semua rekening</option>' + names.map(n=>`<option value="${esc(n)}" ${cur===n?'selected':''}>${esc(n)}</option>`).join('');
}
function onTxnRange(){
  const from=(document.getElementById('txnFrom')||{}).value||'', to=(document.getElementById('txnTo')||{}).value||'';
  if(from||to){ state.txnMonth=''; renderTxnMonthTabs(); }  // rentang aktif → matikan tab bulan
  filterTxn();
}
function clearTxnRange(){
  const f=document.getElementById('txnFrom'), t=document.getElementById('txnTo');
  if(f)f.value=''; if(t)t.value=''; filterTxn();
}
function filterTxn() {
  const q = document.getElementById('txnSearch').value.toLowerCase();
  const tipe = document.getElementById('txnTipeFilter').value;
  const rek = document.getElementById('txnRekFilter').value;
  const from = (document.getElementById('txnFrom')||{}).value || '';
  const to = (document.getElementById('txnTo')||{}).value || '';
  const rangeActive = !!(from || to);
  let data = [...state.txns];
  if (!rangeActive && state.txnMonth) data = data.filter(t => String(t.TANGGAL).slice(0,7) === state.txnMonth);
  if (from) data = data.filter(t => String(t.TANGGAL).slice(0,10) >= from);
  if (to)   data = data.filter(t => String(t.TANGGAL).slice(0,10) <= to);
  if (q) data = data.filter(t => (String(t.PROJECT)+String(t.NOTES)+String(t.KATEGORI)).toLowerCase().includes(q));
  if (tipe) data = data.filter(t => t.TIPE_LOG === tipe || t.JENIS === tipe);
  if (rek) data = data.filter(t => t.REKENING === rek);
  // Ringkasan (jumlah + masuk/keluar) — berguna utk cek/rekonsiliasi
  const sm = document.getElementById('txnSummary');
  if (sm) {
    const msk = data.filter(t=>t.JENIS==='Pemasukan').reduce((s,t)=>s+Number(t.NOMINAL||0),0);
    const klr = data.filter(t=>t.JENIS==='Pengeluaran').reduce((s,t)=>s+Number(t.NOMINAL||0),0);
    const oldRange = rangeActive && state.txnsSince && from && from < String(state.txnsSince).slice(0,10);
    sm.innerHTML = `<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:8px 10px;background:var(--inset);border:1px solid var(--border2);border-radius:8px;font-size:11px">
      <span style="color:var(--text2)"><b>${data.length}</b> transaksi</span>
      <span style="color:var(--green)">masuk <b>${fmt(msk)}</b></span>
      <span style="color:var(--red)">keluar <b>${fmt(klr)}</b></span>
      <span style="color:${(msk-klr)>=0?'var(--green)':'var(--red)'}">net <b>${(msk-klr)>=0?'+':'-'}${fmt(Math.abs(msk-klr))}</b></span>
      ${oldRange?`<span style="color:var(--amber)">⚠ sebagian tgl mungkin belum dimuat — tekan "lebih lama"</span>`:''}
    </div>`;
  }
  renderTxn(data);
}

function doneSummaryLine(list){

function switchProjTab(tab){
  state.currentProjTab = tab;
  document.querySelectorAll('[id^="pTab-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('pTab-'+tab); if(btn)btn.classList.add('active');
  renderProject();
}

function renderProject() {
  const tab = state.currentProjTab || 'semua';
  const byDate = arr => arr.sort((a,b)=>projLastDate(b.NAMA).localeCompare(projLastDate(a.NAMA)));
  const jalan  = state.projects.filter(p=>p.STATUS==='Jalan');
  const hold   = state.projects.filter(p=>p.STATUS==='Hold');
  const selesai= byDate(state.projects.filter(p=>p.STATUS==='Selesai'));
  const abaikan= byDate(state.projects.filter(p=>p.STATUS==='Abaikan'));
  let html='';

  if (tab==='jalan')      html = jalan.length ? jalan.map(projCard).join('') : '<div class="empty">Tidak ada project berjalan</div>';
  else if (tab==='hold')  html = hold.length  ? hold.map(projCard).join('')  : '<div class="empty">Tidak ada project hold</div>';
  else if (tab==='selesai') html = selesai.length ? doneSummaryLine(selesai)+projDoneGrid(selesai) : '<div class="empty">Belum ada project selesai</div>';
  else if (tab==='abaikan') html = abaikan.length ? '<div class="settings-sub" style="margin-bottom:8px">Project ini diabaikan dari perhitungan Laba Bersih (data belum lengkap). Ubah status di Edit kalau mau dihitung lagi.</div>'+abaikan.map(projCard).join('') : '<div class="empty">Tidak ada project diabaikan</div>';
  else { // semua: kartu aktif (Jalan+Hold) lalu rekap grid Selesai
    const active=[...jalan,...hold];
    if(active.length) html += `<div class="card-title" style="margin-bottom:8px">Project Berjalan & Hold (${active.length})</div>` + active.map(projCard).join('');
    if(selesai.length) html += `<div class="card-title" style="margin:18px 0 8px">Project Selesai · Rekap (${selesai.length})</div>` + doneSummaryLine(selesai) + projDoneGrid(selesai);
    if(abaikan.length) html += `<div class="settings-sub" style="margin-top:16px;cursor:pointer" onclick="switchProjTab('abaikan')">⊘ ${abaikan.length} project diabaikan (tidak masuk laba) — ketuk untuk lihat</div>`;
    if(!html) html='<div class="empty">Belum ada project</div>';
  }
  document.getElementById('projList').innerHTML = html;
}

// ── KASBON KARYAWAN ───────────────────────────────────
function kasbonAgg(){
  const m = {};
  state.kasbon.forEach(k => {
    const nm = k.KARYAWAN || '—';
    const a = m[nm] || (m[nm] = { pinjam:0, kembali:0, saldo:0, last:'' });
    const amt = Number(k.NOMINAL)||0;
    if (k.JENIS==='Pinjam') a.pinjam += amt; else a.kembali += amt;
    a.saldo = a.pinjam - a.kembali;
    const d = String(k.TANGGAL).slice(0,10); if (d > a.last) a.last = d;
  });
  return m;
}
function kasbonEmployees(){ return [...new Set(state.kasbon.map(k=>k.KARYAWAN).filter(Boolean))].sort(); }
function renderKasbon(){
  const agg = kasbonAgg();
  const names = Object.keys(agg).sort((a,b)=> agg[b].saldo - agg[a].saldo);
  const totalOut = Object.values(agg).reduce((s,a)=>s+a.saldo,0);
  let html = `<div class="card" style="margin-bottom:12px;background:var(--hero-amber-bg);border:1px solid var(--hero-amber-bd)">
      <div class="metric-label">Total Kasbon Beredar (piutang)</div>
      <div class="metric-value" style="font-size:24px;color:${totalOut>0?'var(--amber)':'var(--green)'}">${fmt(totalOut)}</div>
      <div class="metric-sub">${names.length} karyawan</div>
    </div>`;
  if (!names.length) { document.getElementById('kasbonList').innerHTML = html + '<div class="empty">Belum ada kasbon. Tekan "Catat Kasbon".</div>'; return; }
  html += names.map(nm=>{
    const a = agg[nm];
    return `<div class="card" onclick="openKasbonDetail('${esc(nm).replace(/'/g,"\\'")}')" style="cursor:pointer;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(nm)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">pinjam ${fmtS(a.pinjam)} · kembali ${fmtS(a.kembali)} · ${a.last||'—'}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase">Sisa kasbon</div>
        <div style="font-size:15px;font-weight:700;color:${a.saldo>0?'var(--amber)':a.saldo<0?'var(--red)':'var(--green)'}">${fmt(a.saldo)}</div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text3);flex-shrink:0"></i>
    </div>`;
  }).join('');
  document.getElementById('kasbonList').innerHTML = html;
}

function saveKasbon(){
  const nama=(document.getElementById('kb_nama').value||'').trim();
  const jenis=document.getElementById('kb_jenis').value;
  let metode=document.getElementById('kb_metode').value;
  if(jenis==='Pinjam') metode='Tunai';
  const nominal=unfmtNum(document.getElementById('kb_nominal').value);
  const tgl=document.getElementById('kb_tgl').value;
  const notes=document.getElementById('kb_notes').value;
  const rek=document.getElementById('kb_rek').value;
  if(!nama||!nominal||!tgl){showToast('Nama, nominal, tanggal wajib diisi','error');return;}
  if(!rek){showToast('Pilih rekening','error');return;}
  // v29.4: optimistic (seperti Transaksi) — UI langsung, kirim di latar, tanpa syncAll penuh.
  const now=new Date().toISOString();
  const ref='KB'+Date.now(), id='ID'+Date.now(), txnId=id+'K';
  state.kasbon.unshift({ID:id,TANGGAL:tgl,KARYAWAN:nama,JENIS:jenis,NOMINAL:nominal,METODE:metode,REKENING:rek,NOTES:notes,REF_ID:ref,CREATED_BY:state.user,CREATED_AT:now});
  if(rek){
    const ktxn={ID:txnId,TANGGAL:tgl,JENIS:(jenis==='Pinjam'?'Pengeluaran':'Pemasukan'),PROJECT:'',REKENING:rek,KATEGORI:(jenis==='Pinjam'?'Kasbon Keluar':'Kasbon Masuk'),NOMINAL:nominal,NOTES:'[KASBON '+ref+'] '+(jenis==='Pinjam'?'pinjam':'kembali')+' '+nama+' ('+metode+') '+(notes||''),TIPE_LOG:'Kasbon',CREATED_BY:state.user,CREATED_AT:now};
    state.txns.unshift(ktxn); applySummaryDelta(ktxn,1);
  }
  if(API_URL)bgPost({action:'addKasbon',data:{ID:id,REF_ID:ref,TXN_ID:txnId,TANGGAL:tgl,KARYAWAN:nama,JENIS:jenis,NOMINAL:nominal,METODE:metode,REKENING:rek,NOTES:notes,USER:state.user}},'Kasbon '+nama);
  saveLocal(); closeDrawer(); renderKasbon(); renderDashboard(); filterTxn();
  showToast('Kasbon '+jenis.toLowerCase()+' '+nama+' '+fmt(nominal)+' ✓','success');
}

// ── KOMPOSISI PENGELUARAN (donut per kategori) ────────
const KAT_PALETTE = ['#5b9cf6','#f5a623','#a78bfa','#f06a6a','#2EE6A6','#e879c9','#fbbf24','#60a5fa','#34d399','#f87171','#c084fc','#22d3ee','#a3e635','#fb923c','#94a3b8'];
function katComposition(txns) {
  const m = {};
  txns.filter(t => t.JENIS === 'Pengeluaran').forEach(t => {
    const k = t.KATEGORI || 'Lainnya';
    m[k] = (m[k] || 0) + Number(t.NOMINAL || 0);
  });
  return Object.entries(m).filter(e => e[1] > 0).sort((a,b) => b[1]-a[1]);
}
// ── Komposisi pengeluaran: pilih KELOMPOK → rincian item kategori di dalamnya ──
let _expCustomCache = null; // {from,to,txns} hasil fetch periode custom
// Total per nama-kategori utk periode terpilih (exclude transfer/reserve/kasbon via TIPE_LOG)
function expRawCats(period, jenis){
  jenis = jenis || 'Pengeluaran';
  const m = {};
  if (jenis==='Pengeluaran' && period === 'all' && state.summary && state.summary.katExp) {
    Object.entries(state.summary.katExp).forEach(([k,v]) => m[k] = (m[k]||0) + Number(v||0));
    return m;
  }
  let src;
  if (period === 'custom') {
    src = (_expCustomCache && _expCustomCache.from===state.expFrom && _expCustomCache.to===state.expTo)
          ? _expCustomCache.txns : [];
  } else if (period === 'all') {
    if (_expAllCache) src = _expAllCache; else { ensureExpAll(); src = state.txns; }
  } else {
    let cutoff = '';
    if (period === 'month') cutoff = today().slice(0,7) + '-01';
    else if (period === '3m') { const d=new Date(); d.setMonth(d.getMonth()-3); cutoff=d.toISOString().slice(0,10); }
    src = state.txns.filter(t => !cutoff || String(t.TANGGAL) >= cutoff);
  }
  src.filter(t => t.JENIS===jenis && t.TIPE_LOG===jenis)
     .forEach(t => { const k = t.KATEGORI || 'Lainnya'; m[k] = (m[k]||0) + Number(t.NOMINAL||0); });
  return m;
}
// Pemasukan → selalu per kategori. Pengeluaran → group 'ALL' agregat per KELOMPOK; group spesifik → kategori dlm kelompok.
function expComposition(period, group, jenis){
  jenis = jenis || 'Pengeluaran';
  const cats = expRawCats(period, jenis);
  if (jenis==='Pemasukan') {
    return Object.entries(cats).filter(e => e[1]>0).sort((a,b)=>b[1]-a[1]);
  }
  const katGrp = {}; state.kategori.forEach(k => katGrp[k.NAMA] = k.KELOMPOK);
  if (group && group !== 'ALL') {
    return Object.entries(cats).filter(([k,v]) => v>0 && (katGrp[k]||'LAINNYA')===group).sort((a,b)=>b[1]-a[1]);
  }
  const g = {}; Object.entries(cats).forEach(([k,v]) => { const grp = katGrp[k]||'LAINNYA'; g[grp] = (g[grp]||0)+v; });
  return Object.entries(g).filter(e => e[1]>0).sort((a,b)=>b[1]-a[1]);
}
function setExpJenis(j){ state.expJenis = j; renderMaster(); }
let _expAllLoading = false;
function ensureExpAll(){
  if (_expAllCache || _expAllLoading || !API_URL) return;
  _expAllLoading = true;
  apiGet({ action:'getTxns' }).then(r => {
    _expAllCache = Array.isArray(r) ? r : [];
    _expAllLoading = false;
    if (state.currentPage==='master' && state.currentMasterTab==='kat') renderMaster();
  });
}
function setExpGroup(v){ state.expGroup = v; renderMaster(); }
function setExpPeriod(p){ state.expPeriod = p; renderMaster(); }
async function applyExpCustom(){
  const from = document.getElementById('expFrom').value, to = document.getElementById('expTo').value;
  if (!from || !to) { showToast('Isi tanggal Dari & Sampai','error'); return; }
  if (from > to) { showToast('Tanggal Dari melebihi Sampai','error'); return; }
  state.expFrom = from; state.expTo = to; state.expPeriod = 'custom';
  if (API_URL) {
    showToast('Mengambil data periode...','success');
    const res = await apiGet({ action:'getTxns', since:from, until:to });
    _expCustomCache = { from, to, txns: Array.isArray(res) ? res : [] };
  } else {
    _expCustomCache = { from, to, txns: state.txns.filter(t => String(t.TANGGAL)>=from && String(t.TANGGAL)<=to) };
  }
  renderMaster();
}
let _expAllCache = null; // cache txn all-time utk detail periode 'Semua'
// Klik slice/legend: di ALL → drill ke kelompok; di kelompok → buka daftar txn kategori
function expSliceClick(name){
  if ((state.expJenis||'Pengeluaran')==='Pemasukan') { openExpTxnDetail(name,'Pemasukan'); return; }
  if ((state.expGroup||'ALL')==='ALL') setExpGroup(name);
  else openExpTxnDetail(name,'Pengeluaran');
}
async function expPeriodTxns(){
  const period = state.expPeriod || 'month';
  if (period==='custom') return _expCustomCache ? _expCustomCache.txns : [];
  if (period==='all') {
    if (!_expAllCache) {
      if (API_URL) { const r = await apiGet({ action:'getTxns' }); _expAllCache = Array.isArray(r)?r:state.txns.slice(); }
      else _expAllCache = state.txns.slice();
    }
    return _expAllCache;
  }
  let cutoff='';
  if (period==='month') cutoff = today().slice(0,7)+'-01';
  else if (period==='3m') { const d=new Date(); d.setMonth(d.getMonth()-3); cutoff=d.toISOString().slice(0,10); }
  return state.txns.filter(t => !cutoff || String(t.TANGGAL)>=cutoff);
}

    ${rows.length ? rows.map(detailTxnCard).join('') : '<div class="empty">Tidak ada transaksi</div>'}`;
}
function expCompCardHTML(){
  const period = state.expPeriod || 'month';
  const group  = state.expGroup || 'ALL';

  const isInc  = jenis === 'Pemasukan';

  const row = (lbl,val,col)=>`<div style="display:flex;justify-content:space-between;font-size:11px;margin:2px 0"><span style="color:var(--text3)">${lbl}</span><span style="font-weight:600;${col?'color:'+col:''}">${val}</span></div>`;

    <button onclick="openAddendumForm('${p.ID}','Tambah')" style="flex:1;background:var(--ic-green);border:1px solid #2EE6A640;color:var(--green);border-radius:8px;padding:8px;font-size:11px;font-weight:600;cursor:pointer">+ Kerja Tambah</button>

  h += `</div>`;

function _invRp(n){ return Number(Math.round(Math.abs(n||0))).toLocaleString('id-ID'); }
function tglIndo(iso){ const M=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember']; const p=String(iso||'').slice(0,10).split('-'); if(p.length<3||!p[2]) return String(iso||''); return (+p[2])+' '+(M[(+p[1])-1]||'')+' '+p[0]; }
function terbilang(n){
  n=Math.floor(Math.abs(Number(n)||0));
  const sat=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
  function t(x){
    if(x<12) return sat[x];
    if(x<20) return t(x-10)+' belas';
    if(x<100) return t(Math.floor(x/10))+' puluh'+(x%10?' '+t(x%10):'');
    if(x<200) return 'seratus'+(x%100?' '+t(x%100):'');
    if(x<1000) return t(Math.floor(x/100))+' ratus'+(x%100?' '+t(x%100):'');
    if(x<2000) return 'seribu'+(x%1000?' '+t(x%1000):'');
    if(x<1000000) return t(Math.floor(x/1000))+' ribu'+(x%1000?' '+t(x%1000):'');
    if(x<1000000000) return t(Math.floor(x/1000000))+' juta'+(x%1000000?' '+t(x%1000000):'');
    if(x<1000000000000) return t(Math.floor(x/1000000000))+' miliar'+(x%1000000000?' '+t(x%1000000000):'');
    return t(Math.floor(x/1000000000000))+' triliun'+(x%1000000000000?' '+t(x%1000000000000):'');
  }
  if(n===0) return 'nol';
  return t(n).replace(/\s+/g,' ').trim();
}

function _esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _invPct(p,nominal){ const k=Number(p.NILAI_CONTRACT||0); return k>0?Math.round(nominal/k*100):0; }
function openInvoiceBuilder(projId){
  const p=state.projects.find(x=>x.ID===projId); if(!p) return;
  const termins=(state.piutang||[]).filter(x=>x.PROJECT===p.NAMA);
  if(!termins.length){ showToast('Belum ada termin. Buat jadwal termin dulu.','error'); return; }
  closeInvoiceBuilder();
  const div=document.createElement('div'); div.id='invModal';
  div.style.cssText='position:fixed;inset:0;z-index:330;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px';
  div.onclick=(e)=>{ if(e.target===div) closeInvoiceBuilder(); };
  const opts=termins.map((t,i)=>`<option value="${t.ID}">${esc(t.TERMIN||('Termin '+(i+1)))} — ${fmt(t.NOMINAL)} (${t.STATUS==='Lunas'?'Lunas':'Belum'})</option>`).join('');
  div.innerHTML=`<div style="background:var(--bg2,#0E1611);border:1px solid var(--border2);border-radius:14px;padding:16px;width:100%;max-width:440px;max-height:88vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.5)">
    <div style="font-size:14px;font-weight:700">Buat Invoice</div>
    <div style="font-size:11px;color:var(--text3);margin:2px 0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.NAMA)}</div>
    <div class="form-group"><label class="form-label">Termin yang ditagih</label><select class="form-input" id="inv_termin" onchange="invOnTermin('${projId}')">${opts}</select></div>
    <div class="form-group"><label class="form-label">Nama Customer</label><input class="form-input" id="inv_cust" value="${esc(p.KLIEN||'')}" placeholder="Nama customer..."></div>
    <div class="form-group"><label class="form-label">Alamat Customer <span style="color:var(--text3);font-weight:400">(opsional)</span></label><input class="form-input" id="inv_alamat" value="${esc(p.ALAMAT_KLIEN||'')}" placeholder="Alamat customer..."></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tanggal invoice</label><input class="form-input" type="date" id="inv_tgl" value="${today()}" oninput="invPreview('${projId}')"></div>
      <div class="form-group"><label class="form-label">No urut</label><input class="form-input" id="inv_seq" value="01" oninput="invPreview('${projId}')" style="text-align:center"></div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin:-4px 0 10px">No. Invoice: <span id="inv_no_prev" style="color:var(--gold)"></span>${p.KODE?'':' · ⚠️ Kode invoice kosong (isi di Edit Project)'}</div>
    <div class="form-group"><label class="form-label">Nama Barang / Deskripsi</label><textarea class="form-input" id="inv_desc" rows="2" style="resize:vertical"></textarea></div>
    <div class="form-group"><label class="form-label">Catatan (opsional)</label><input class="form-input" id="inv_note" placeholder="NOTE di invoice..."></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="closeInvoiceBuilder()" style="flex:1;background:var(--bg3,#1a1a2e);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:11px;font-size:12px;cursor:pointer">Batal</button>
      <button onclick="genInvoice('${projId}')" style="flex:2;background:var(--green);border:none;color:#06140D;border-radius:8px;padding:11px;font-size:12px;font-weight:700;cursor:pointer"><i class="ti ti-file-invoice"></i> Buat Invoice</button>
    </div>
  </div>`;
  document.body.appendChild(div); invOnTermin(projId);
}
function closeInvoiceBuilder(){ const m=document.getElementById('invModal'); if(m) m.remove(); }
function invOnTermin(projId){
  const p=state.projects.find(x=>x.ID===projId); if(!p) return;
  const tid=document.getElementById('inv_termin').value;
  const t=(state.piutang||[]).find(x=>x.ID===tid); if(!t) return;
  const pct=_invPct(p,Number(t.NOMINAL||0));
  document.getElementById('inv_desc').value=`PEMBAYARAN ${(t.TERMIN||'').toUpperCase()} (${pct}%) ${(p.NAMA||'').toUpperCase()}`;
  const termins=(state.piutang||[]).filter(x=>x.PROJECT===p.NAMA);
  const idx=termins.findIndex(x=>x.ID===tid);
  document.getElementById('inv_seq').value=String(idx+1).padStart(2,'0');

async function doTransfer() {
  const dari = document.getElementById('tr_dari').value;
  const ke = document.getElementById('tr_ke').value;
  const nominal = unfmtNum(document.getElementById('tr_nominal').value);
  const tgl = document.getElementById('tr_tgl').value;
  const notes = document.getElementById('tr_notes').value;
  if (!nominal || !tgl) { showToast('Nominal dan tanggal wajib diisi', 'error'); return; }
  if (dari === ke) { showToast('Rekening asal dan tujuan sama!', 'error'); return; }
  // Mode edit: hapus transfer lama dulu (lokal + server) sebelum buat yang baru
  const editRef = editTransferRef; editTransferRef = null;
  if (editRef) {
    const rm = state.txns.filter(t => t.TIPE_LOG==='Transfer' && String(t.NOTES||'').indexOf(editRef)>=0);
    rm.forEach(t => applySummaryDelta(t, -1));
    state.txns = state.txns.filter(t => !(t.TIPE_LOG==='Transfer' && String(t.NOTES||'').indexOf(editRef)>=0));
    state.transfers = state.transfers.filter(t => String(t.REF_ID)!==String(editRef));
    if (API_URL) await apiPost({ action: 'deleteTransfer', data: { refId: editRef } });
  }
  const refId = 'TR' + Date.now();
  const now = new Date().toISOString();
  const t1 = {ID:uid(),TANGGAL:tgl,JENIS:'Pengeluaran',PROJECT:'',REKENING:dari,KATEGORI:'Transfer Keluar',NOMINAL:nominal,NOTES:`[${refId}] → ${ke} ${notes}`,TIPE_LOG:'Transfer',CREATED_AT:now};
  const t2 = {ID:uid(),TANGGAL:tgl,JENIS:'Pemasukan',PROJECT:'',REKENING:ke,KATEGORI:'Transfer Masuk',NOMINAL:nominal,NOTES:`[${refId}] ← ${dari} ${notes}`,TIPE_LOG:'Transfer',CREATED_AT:now};
  const tr = {ID:uid(),TANGGAL:tgl,DARI:dari,KE:ke,NOMINAL:nominal,NOTES:notes,REF_ID:refId,CREATED_BY:state.user,CREATED_AT:now};
  state.txns.unshift(t1, t2);
  state.transfers.unshift(tr);
  applySummaryDelta(t1, 1); applySummaryDelta(t2, 1);
  saveLocal();
  if (API_URL) {
    await apiPost({ action: 'addTransfer', data: {TANGGAL:tgl,DARI:dari,KE:ke,NOMINAL:nominal,NOTES:notes,USER:state.user} });
  }
  document.getElementById('tr_nominal').value = '';
  document.getElementById('tr_notes').value = '';
  document.getElementById('trPreview').style.display = 'none';
  updateTransferBtn();
  renderDashboard(); filterTxn(); renderTransferHist();
  showToast(editRef ? 'Transfer diperbarui ✓' : `Transfer ${fmt(nominal)} berhasil ✓`, 'success');
}

function updateTransferBtn() {
  const b = document.getElementById('trSubmitBtn'), c = document.getElementById('trCancelBtn');
  if (b) b.innerHTML = editTransferRef ? '<i class="ti ti-device-floppy"></i> Update Transfer' : '<i class="ti ti-arrows-exchange"></i> Proses Transfer';
  if (c) c.style.display = editTransferRef ? 'block' : 'none';
}

async function deleteTransferRow(ref) {
  if (!confirm('Hapus transfer ini? 2 transaksi terkait + 1 log akan ikut dihapus.')) return;
  const rm = state.txns.filter(t => t.TIPE_LOG==='Transfer' && String(t.NOTES||'').indexOf(ref)>=0);
  rm.forEach(t => applySummaryDelta(t, -1));
  state.txns = state.txns.filter(t => !(t.TIPE_LOG==='Transfer' && String(t.NOTES||'').indexOf(ref)>=0));
  state.transfers = state.transfers.filter(t => String(t.REF_ID)!==String(ref));
  saveLocal();
  if (API_URL) await apiPost({ action: 'deleteTransfer', data: { refId: ref } });
  renderDashboard(); filterTxn(); renderTransferHist();
  showToast('Transfer dihapus', 'success');
}

async function doReserve() {
  const dari = document.getElementById('res_dari').value;
  const holding = document.getElementById('res_holding').value || dari;
  const kartu = document.getElementById('res_kartu').value;
  const nominal = unfmtNum(document.getElementById('res_nominal').value);
  const tgl = document.getElementById('res_tgl').value;
  const notes = document.getElementById('res_notes').value;
  if (!nominal || !tgl) { showToast('Nominal dan tanggal wajib diisi', 'error'); return; }
  const now = new Date().toISOString();
  // v18 optimistic: transfer NYATA sumber→penyimpan (bila beda) + earmark
  if (dari !== holding) {
    const t1 = {ID:uid(),TANGGAL:tgl,JENIS:'Pengeluaran',PROJECT:'',REKENING:dari,KATEGORI:'Reserve CC',NOMINAL:nominal,NOTES:`[RESERVE → ${kartu}] simpan di ${holding} ${notes}`,TIPE_LOG:'Reserve',CREATED_AT:now};
    const t2 = {ID:uid(),TANGGAL:tgl,JENIS:'Pemasukan',PROJECT:'',REKENING:holding,KATEGORI:'Reserve Masuk',NOMINAL:nominal,NOTES:`[RESERVE ${kartu}] dari ${dari} ${notes}`,TIPE_LOG:'Reserve',CREATED_AT:now};
    state.txns.unshift(t1); state.txns.unshift(t2);
    applySummaryDelta(t1, 1); applySummaryDelta(t2, 1);
  }
  const r1 = {ID:uid(),TANGGAL:tgl,DARI_REKENING:dari,UNTUK_CC:kartu,NOMINAL:nominal,NOTES:`[HOLD:${holding}] ${notes}`,CREATED_BY:state.user,CREATED_AT:now};
  state.reserves.unshift(r1);
  state.reserveFunds[kartu] = (state.reserveFunds[kartu]||0) + nominal;
  saveLocal();
  if (API_URL) {
    await apiPost({ action: 'addReserve', data: {TANGGAL:tgl,DARI_REKENING:dari,HOLDING:holding,UNTUK_CC:kartu,NOMINAL:nominal,NOTES:notes,USER:state.user} });
  }
  document.getElementById('res_nominal').value = '';
  document.getElementById('res_notes').value = '';
  document.getElementById('resPreview').style.display = 'none';
  renderDashboard(); filterTxn(); renderReserveDetail();
  showToast(`Reserve ${fmt(nominal)} utk ${kartu} disimpan di ${holding} ✓`, 'success');
}

async function saveDrawer() {
  const mode = drawerMode, eid = drawerEditId;
  const now = new Date().toISOString();
  if (mode === 'txn') {
    const tgl=document.getElementById('f_tgl').value,jenis=document.getElementById('f_jenis').value;
    const proj=document.getElementById('f_proj').value,rek=document.getElementById('f_rek').value;
    const nominal=unfmtNum(document.getElementById('f_nominal').value);
    const notes=document.getElementById('f_notes').value;
    // Kategori: pilih Kelompok → Kategori. Opsi "__NEW__" = buat kategori baru di kelompok terpilih.
    const grpSel=document.getElementById('f_kat_grp').value;
    const katVal=document.getElementById('f_kat_sel').value;
    let kat='', newKatObj=null;
    if(katVal==='__NEW__'){
      kat=(document.getElementById('f_kat_new_name').value||'').trim();
      if(kat){
        const exist=state.kategori.find(k=>String(k.NAMA).toLowerCase()===kat.toLowerCase());
        if(exist){kat=exist.NAMA;}
        else newKatObj={ID:uid(),NAMA:kat,KELOMPOK:grpSel,TIPE:jenis,CREATED_AT:now};
      }
    } else { kat=katVal; }
    if(!tgl||!rek||!kat||!nominal){showToast('Tanggal, rekening, kategori, nominal wajib diisi','error');return;}
    // Peringatan: kategori kelompok PROJECT tapi project belum dipilih
    const katObj0=(newKatObj||state.kategori.find(k=>k.NAMA===kat));
    if(katObj0&&katObj0.KELOMPOK==='PROJECT'&&!proj){
      if(!confirm('Kategori "'+kat+'" termasuk kelompok PROJECT, tapi Project belum dipilih.\n\nSimpan tanpa project?'))return;
    }
    if(newKatObj){state.kategori.push(newKatObj);if(API_URL)bgPost({action:'addKat',data:newKatObj},'Kategori '+newKatObj.NAMA);showToast('Kategori baru "'+newKatObj.NAMA+'" ditambahkan','success');}
    const obj={ID:eid||uid(),TANGGAL:tgl,JENIS:jenis,PROJECT:proj,REKENING:rek,KATEGORI:kat,NOMINAL:nominal,NOTES:notes,TIPE_LOG:jenis,CREATED_BY:state.user,CREATED_AT:now};
    let oldT=null;
    if(eid){const i=state.txns.findIndex(x=>x.ID===eid);if(i>=0){oldT=state.txns[i];state.txns[i]=obj;}else state.txns.unshift(obj);}else state.txns.unshift(obj);
    if(oldT)applySummaryDelta(oldT,-1); applySummaryDelta(obj,1);
    if(API_URL)bgPost({action:eid?'updateRow':'addTxn',data:eid?{sheet:'TRANSAKSI',id:eid,updates:obj}:obj},(eid?'Edit ':'')+'Transaksi '+fmt(nominal));
    saveLocal();renderDashboard();filterTxn();renderProject();showToast(eid?'Transaksi diperbarui':'Transaksi tersimpan','success');
  } else if (mode === 'proj') {
    const _fpAl=document.getElementById('fp_alamat'),_fpTe=document.getElementById('fp_telp'),_fpKo=document.getElementById('fp_kode');
    const obj={ID:eid||uid(),NAMA:document.getElementById('fp_nama').value,KLIEN:document.getElementById('fp_klien').value,TGL_MULAI:document.getElementById('fp_tgl').value,STATUS:document.getElementById('fp_status').value,NILAI_CONTRACT:unfmtNum(document.getElementById('fp_nilai').value),ALAMAT_KLIEN:_fpAl?_fpAl.value:'',TELP_KLIEN:_fpTe?_fpTe.value:'',KODE:(_fpKo?_fpKo.value:'').toUpperCase(),CREATED_AT:now};
    if(!obj.NAMA){showToast('Nama project wajib diisi','error');return;}
    if(eid){const i=state.projects.findIndex(x=>x.ID===eid);state.projects[i]=obj;}else state.projects.unshift(obj);
    if(API_URL)bgPost({action:eid?'updateRow':'addProj',data:eid?{sheet:'MASTER_PROJECT',id:eid,updates:obj}:obj},(eid?'Edit ':'')+'Project '+obj.NAMA);
    saveLocal();renderProject();renderDashboard();showToast(eid?'Project diperbarui':'Project ditambahkan','success');
  } else if (mode === 'bank') {

    if(eid){const i=state.banks.findIndex(x=>x.ID===eid);state.banks[i]=obj;}else state.banks.push(obj);
    if(API_URL)bgPost({action:eid?'updateRow':'addBank',data:eid?{sheet:'MASTER_BANK',id:eid,updates:obj}:obj},(eid?'Edit ':'')+'Rekening '+obj.NAMA);

    if(!obj.NAMA){showToast('Nama kartu wajib diisi','error');return;}
    let ccOldName=null;
    if(eid){const i=state.ccs.findIndex(x=>x.ID===eid); if(i>=0){ccOldName=state.ccs[i].NAMA; state.ccs[i]=obj;} else state.ccs.push(obj);}else state.ccs.push(obj);
    const ccRenamed = eid && ccOldName && ccOldName!==obj.NAMA;

function projLinkedCounts(p){
  const nama=p.NAMA;
  const txns=(state.txns||[]).filter(t=>t.PROJECT===nama);
  const masuk=txns.filter(t=>t.JENIS==='Pemasukan').reduce((s,t)=>s+Number(t.NOMINAL||0),0);
  const keluar=txns.filter(t=>t.JENIS==='Pengeluaran').reduce((s,t)=>s+Number(t.NOMINAL||0),0);
  const piutang=(state.piutang||[]).filter(x=>x.PROJECT===nama).length;
  const cicilan=(state.cicilan||[]).filter(x=>x.PROJECT===nama).length;
  const jadwal=(state.jadwal||[]).filter(x=>x.PROJECT===nama).length;
  const addendum=projAddendums(p).length;
  return {txn:txns.length,masuk,keluar,piutang,cicilan,jadwal,addendum,reassignable:txns.length+piutang+cicilan+jadwal};
}

function doDeleteProject(p, toName){
  const from=p.NAMA;
  const reassign=(toName!==null);
  if(reassign){
    (state.txns||[]).forEach(t=>{ if(t.PROJECT===from) t.PROJECT=toName; });
    (state.piutang||[]).forEach(x=>{ if(x.PROJECT===from) x.PROJECT=toName; });
    (state.cicilan||[]).forEach(x=>{ if(x.PROJECT===from) x.PROJECT=toName; });
    (state.jadwal||[]).forEach(x=>{ if(x.PROJECT===from) x.PROJECT=toName; });
    state.addendums=(state.addendums||[]).filter(a=> !(String(a.PROJECT_NAMA)===from || (p.ID&&String(a.PROJECT_ID)===String(p.ID))) );
    if(state.summary&&state.summary.proj){
      const src=state.summary.proj[from];
      if(src){
        if(toName){ const dst=state.summary.proj[toName]||(state.summary.proj[toName]={masuk:0,keluar:0});
          dst.masuk=(dst.masuk||0)+(src.masuk||0); dst.keluar=(dst.keluar||0)+(src.keluar||0); }
        delete state.summary.proj[from];
      }
    }
    if(API_URL) bgPost({action:'reassignProject',data:{from:from,to:toName}}, 'Pindah data '+from+' → '+(toName||'tanpa project'));
  }
  state.projects=state.projects.filter(x=>x.ID!==p.ID);
  if(API_URL) bgPost({action:'deleteRow',data:{sheet:'MASTER_PROJECT',id:p.ID}}, 'Hapus project '+from);
  saveLocal(); closeDrawer(); renderAll();
  showToast('Project dihapus'+(reassign?(toName?' · data → '+toName:' · data jadi tanpa project'):''),'success');
}

let importPayload=null;
function impDateISO(v){
  if(v instanceof Date && !isNaN(v)){const y=v.getFullYear(),m=String(v.getMonth()+1).padStart(2,'0'),d=String(v.getDate()).padStart(2,'0');return y+'-'+m+'-'+d;}
  if(typeof v==='number'){const dt=new Date(Math.round((v-25569)*86400*1000));if(!isNaN(dt)){return dt.toISOString().slice(0,10);}}
  const s=String(v||'').trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  return null;
}

    var kbMap={}; state.kasbon.forEach(function(k){var n=k.KARYAWAN||'?';if(!kbMap[n])kbMap[n]={p:0,b:0};if(k.JENIS==='Pinjam')kbMap[n].p+=Number(k.NOMINAL||0);else kbMap[n].b+=Number(k.NOMINAL||0);});

function handleImportFile(ev){
  const file=ev.target.files[0]; ev.target.value=''; if(!file)return;
  if(!API_URL){showToast('API URL belum diset','error');return;}
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const shName=wb.SheetNames.find(n=>/transaksi/i.test(n))||wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[shName],{header:1,raw:true,defval:''});
      parseImport(rows);
    }catch(err){showToast('Gagal baca file: '+err.message,'error');}
  };
  rd.readAsArrayBuffer(file);
}
function parseImport(rows){
  if(!rows||rows.length<2){showToast('File kosong / tidak ada data','error');return;}
  const hdr=rows[0].map(h=>String(h||'').trim().toUpperCase());
  const ix=name=>hdr.indexOf(name);
  const iT=ix('TANGGAL'),iJ=ix('JENIS'),iP=ix('PROJECT'),iR=ix('REKENING'),iK=ix('KATEGORI'),iKel=ix('KELOMPOK'),iN=ix('NOMINAL'),iNo=ix('NOTES');
  if(iT<0||iJ<0||iR<0||iK<0||iN<0){showToast('Header tidak lengkap. Pakai template (TANGGAL,JENIS,REKENING,KATEGORI,NOMINAL).','error');return;}
  const acctNames=new Set([...state.banks.map(b=>b.NAMA),...state.ccs.map(c=>c.NAMA)]);
  const projNames=new Set(state.projects.map(p=>p.NAMA));
  const katNames=new Set(state.kategori.map(k=>k.NAMA));
  const valid=[],errors=[],newProjMap={},newKatMap={};
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row||row.every(c=>String(c||'').trim()===''))continue;
    const excelRow=r+1;
    const tgl=impDateISO(row[iT]);
    const jenis=String(row[iJ]||'').trim();
    const proj=String(iP>=0?row[iP]:'').trim();
    const rek=String(row[iR]||'').trim();
    const kat=String(row[iK]||'').trim();
    const kel=String(iKel>=0?row[iKel]:'').trim().toUpperCase();
    const nominal=unfmtNum(row[iN]);
    const notes=String(iNo>=0?row[iNo]:'').trim();
    const errs=[];
    if(!tgl)errs.push('tanggal tidak valid');
    if(jenis!=='Pemasukan'&&jenis!=='Pengeluaran')errs.push('JENIS harus Pemasukan/Pengeluaran');
    if(!rek)errs.push('rekening kosong'); else if(!acctNames.has(rek))errs.push('rekening "'+rek+'" tidak ada di master');
    if(!kat)errs.push('kategori kosong');
    if(!nominal||nominal<=0)errs.push('nominal kosong/0');
    if(errs.length){errors.push({row:excelRow,msg:errs.join(', ')});continue;}
    if(proj&&!projNames.has(proj)&&!newProjMap[proj])newProjMap[proj]={NAMA:proj,KLIEN:'',STATUS:'Jalan'};
    if(!katNames.has(kat)&&!newKatMap[kat])newKatMap[kat]={NAMA:kat,KELOMPOK:(kel||(jenis==='Pemasukan'?'PEMASUKAN':'OPERASIONAL')),TIPE:jenis};
    valid.push({TANGGAL:tgl,JENIS:jenis,PROJECT:proj,REKENING:rek,KATEGORI:kat,NOMINAL:nominal,NOTES:notes});
  }
  const newProjs=Object.values(newProjMap),newKats=Object.values(newKatMap);
  importPayload={txns:valid,newProjs,newKats};
  showImportPreview(valid,errors,newProjs,newKats);
}
function showImportPreview(valid,errors,newProjs,newKats){
  const totMasuk=valid.filter(t=>t.JENIS==='Pemasukan').reduce((s,t)=>s+t.NOMINAL,0);
  const totKeluar=valid.filter(t=>t.JENIS==='Pengeluaran').reduce((s,t)=>s+t.NOMINAL,0);
  document.getElementById('drawerTitle').textContent='Preview Import';
  let html=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="metric"><div class="metric-label">Baris valid</div><div class="metric-value" style="color:var(--green)">${valid.length}</div></div>
      <div class="metric"><div class="metric-label">Baris error</div><div class="metric-value" style="color:${errors.length?'var(--red)':'inherit'}">${errors.length}</div></div>
    </div>
    <div class="settings-row"><div class="settings-label">Total Pemasukan</div><div style="color:var(--green);font-weight:600">${fmt(totMasuk)}</div></div>
    <div class="settings-row"><div class="settings-label">Total Pengeluaran</div><div style="color:var(--red);font-weight:600">${fmt(totKeluar)}</div></div>`;
  if(newProjs.length)html+=`<div style="margin-top:10px"><b>Project baru (${newProjs.length}) akan dibuat:</b><div class="settings-sub">${newProjs.map(p=>esc(p.NAMA)).join(', ')}</div></div>`;
  if(newKats.length)html+=`<div style="margin-top:10px"><b>Kategori baru (${newKats.length}) akan dibuat:</b><div class="settings-sub">${newKats.map(k=>esc(k.NAMA)+' ['+k.KELOMPOK+']').join(', ')}</div></div>`;
  if(errors.length){
    html+=`<div style="margin-top:12px;color:var(--red)"><b>Baris ditolak — perbaiki di Excel lalu import ulang:</b></div>
      <div style="max-height:180px;overflow:auto;font-size:13px;margin-top:6px">${errors.map(e=>`<div style="padding:4px 0;border-bottom:1px solid #2a2a2a">Baris ${e.row}: ${esc(e.msg)}</div>`).join('')}</div>`;
  }
  html+=`<div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn-primary" style="flex:1" onclick="confirmImport()" ${valid.length?'':'disabled'}><i class="ti ti-database-import"></i> Konfirmasi Import (${valid.length})</button>
      <button class="btn-secondary" onclick="closeDrawer()">Batal</button></div>`;
  if(!valid.length)html+=`<div class="settings-sub" style="margin-top:8px;color:var(--red)">Tidak ada baris valid untuk diimport.</div>`;
  document.getElementById('drawerBody').innerHTML=html;
  drawerMode='import';
  document.getElementById('drawerBg').classList.add('open');
}
async function confirmImport(){
  if(!importPayload||!importPayload.txns.length){showToast('Tidak ada data','error');return;}
  const n=importPayload.txns.length;
  document.getElementById('drawerBody').innerHTML='<div style="text-align:center;padding:30px"><div class="spin" style="margin:0 auto 12px"></div>Mengimport '+n+' transaksi...</div>';
  const res=await apiPost({action:'addTxnBatch',data:{...importPayload,USER:state.user}});
  if(res&&!res.error){
    importPayload=null;closeDrawer();
    showToast('Import berhasil: '+(res.txn||n)+' transaksi ✓','success');
    await syncAll();
  }else{
    showToast('Gagal import: '+((res&&res.error)||'koneksi'),'error');
    closeDrawer();
  }
}

  var startY=0, pulling=false, dist=0, busy=false, TH=70;
  el.addEventListener('touchstart',function(e){ if(busy) return; if(el.scrollTop<=0){ startY=e.touches[0].clientY; pulling=true; dist=0; } else pulling=false; },{passive:true});
  el.addEventListener('touchmove',function(e){ if(!pulling||busy) return; dist=e.touches[0].clientY-startY; if(dist>0){ var d=Math.min(dist*0.5,80); ind.style.height=d+'px'; ind.style.opacity=Math.min(1,d/TH); var ic=ind.querySelector('i'); if(ic) ic.style.transform='rotate('+Math.min(180,d/TH*180)+'deg)'; } },{passive:true});
  el.addEventListener('touchend',function(){ if(!pulling||busy) return; pulling=false; if(dist*0.5>=TH){ busy=true; ind.classList.add('ptr-load'); ind.style.height='44px'; ind.style.opacity='1'; Promise.resolve(typeof syncAll==='function'?syncAll():null).catch(function(){}).then(function(){ setTimeout(function(){ ind.classList.remove('ptr-load'); ind.style.height='0'; ind.style.opacity='0'; busy=false; },250); }); } else { ind.style.height='0'; ind.style.opacity='0'; } dist=0; },{passive:true});
})();
let logoTimer;
document.querySelector('.topbar-title').addEventListener('touchstart',()=>{logoTimer=setTimeout(()=>openDrawer('settings'),800);});
document.querySelector('.topbar-title').addEventListener('touchend',()=>clearTimeout(logoTimer));
document.querySelector('.topbar-title').addEventListener('click',()=>openDrawer('settings'));
</script>
</body>
